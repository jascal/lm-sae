title: "A Field Guide to Attention"
description: "A cross-architecture, causally-validated catalog of transformer operators and circuits (the lm-sae disassembly → decompilation program)."
theme: jekyll-theme-cayman
show_downloads: false
# render front-matter-less markdown (the generated catalog pages) with the theme layout
